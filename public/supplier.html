<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Aden Supplier Portal - S2C SRM Prototype</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-workspace="supplier">
    <div class="app-shell">
      <aside class="sidebar supplier-sidebar">
        <div class="brand">
          <img src="./assets/aden-logo.jpg" alt="Aden" />
          <div>
            <strong>Supplier Portal</strong>
            <span>External collaboration</span>
          </div>
        </div>

        <a class="workspace-link" href="./buyer.html">Open Buyer Workspace</a>
        <nav class="nav" id="nav"></nav>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <p class="eyebrow" id="workspaceLabel">Supplier Portal</p>
            <h1 id="pageTitle">Supplier Workbench</h1>
          </div>
          <div class="top-actions">
            <label class="search">
              <span>Search</span>
              <input id="globalSearch" type="search" placeholder="RFQ, PO, statement, document..." />
            </label>
            <button class="icon-btn" id="openNotifications" type="button" aria-label="Open notifications">!</button>
            <button class="primary-btn" id="primaryAction" type="button">Open Tasks</button>
          </div>
        </header>

        <section class="status-bar">
          <div class="status-card integration-status">
            <i aria-hidden="true"></i>
            <span>Buyer connection</span>
            <strong>Aden Procurement messages synced 6 min ago</strong>
            <small>7 open invitations · 4 POs to confirm · 2 statements awaiting approval</small>
          </div>
        </section>

        <section id="content" class="content"></section>
      </main>
    </div>

    <div class="drawer-backdrop" id="drawerBackdrop" hidden></div>
    <aside class="drawer" id="drawer" aria-hidden="true">
      <div class="drawer-head">
        <div>
          <p class="eyebrow" id="drawerKicker">Detail</p>
          <h2 id="drawerTitle">Record detail</h2>
        </div>
        <button class="icon-btn" id="closeDrawer" type="button" aria-label="Close detail">x</button>
      </div>
      <div id="drawerBody" class="drawer-body"></div>
    </aside>

    <script src="./script.js?v=v2"></script>
    <script>
      (function() {
        const token = localStorage.getItem('aden_token');
        const user = JSON.parse(localStorage.getItem('aden_user') || '{}');
        if (!token || (user.role !== 'supplier' && user.role !== 'admin')) {
          window.location.href = './login.html';
        }
      })();
    </script>
  </body>
</html>
